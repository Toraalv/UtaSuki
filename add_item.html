<!DOCTYPE html>
<html lang="sv">
	<head>
		<!--Måste vara med på alla sidor-->
		<meta charset="UTF-8">
		<title>UtaSuki</title>
		<link rel="icon" type="image/x-icon" href="static/images/Uta_logo.png">
		<meta name="viewport" content="width=device-width, initial-scale=1"/>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@500&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="static/stylesheets/style.css">

		<!--Men inte detta-->
		<link rel="stylesheet" href="static/stylesheets/addStyle.css">
		<script src="static/javascripts/jquery-3.6.3.min.js"></script>
	</head>
	<body>
		<!--Måste vara med på alla sidor-->
		<header>
			<a href="/"><img src="static/images/Uta_logo.png" alt="Start page"></a>
			<h1>Add track</h1>
			<a href="/add_item"><img src="static/images/Uta_add.png" alt="Add track"></a>
		</header>
		<main>
			<fieldset id="fieldsetContainer">
				<form id="trackForm" method="post" enctype="multipart/form-data" action="/add_item">
					<div class="flex-row">
						<label for="imageSelect"><img src="static/images/imageInput.webp" id="placeholderImg"><input type="file" name="file" accept="image/*" id="imageSelect"></label>
						<table cellpadding="5" cellspacing="0" id="trackFormInfo">
							<tbody>
								<tr>
									<td>Date</td>
									<td>
										Year: 
										<select id="select_year" name="selected_year" required>
											<option value="2025">2025</option>
											<option value="2024">2024</option>
											<option value="2023">2023</option>
											<option value="2022">2022</option>
											<option value="2021">2021</option>
											<option value="2020">2020</option>
											<option value="2019">2019</option>
											<option value="2018">2018</option>
											<option value="2017">2017</option>
										</select>
										Month: 
										<select id="select_month" name="selected_month" required>
											<option value="01">January</option>
											<option value="02">February</option>
											<option value="03">March</option>
											<option value="04">April</option>
											<option value="05">May</option>
											<option value="06">June</option>
											<option value="07">July</option>
											<option value="08">August</option>
											<option value="09">September</option>
											<option value="10">October</option>
											<option value="11">November</option>
											<option value="12">December</option>
										</select>
									</td>
								</tr>
								<tr>
									<td>Track name:</td>
									<td>
										<input type="text" name="track_name" autocomplete="off" required>
									</td>
								</tr>
								<tr>
									<td>Artist name:</td>
									<td>
										<input type="text" name="artist_name" autocomplete="off" required>
									</td>
								</tr>
								<tr>
									<td>Album name:</td>
									<td>
										<input type="text" name="album_name" autocomplete="off" required>
									</td>
								</tr>
								<tr>
									<td>Description:</td>
									<td>
										<textarea name="description" rows="3" autocomplete="off"></textarea>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
					<input type="submit" value="Add" id="addBtn">
				</form>
			</fieldset>
		</main>
		<script src="static/javascripts/additem.js"></script>
	</body>
</html>
